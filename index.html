/*==========================

===========================*/

content:"";

radial-gradient(circle at 15% 20%,#00d9ff55 0%,transparent 30%),

Floating Blobs
=======================*/

.blob{

position:fixed;

border-radius:50%;

filter:blur(120px);

pointer-events:none;

z-index:-2;

height:350px;

}

.blob:nth-child(2){

}

.blob:nth-child(3){

width:260px;

height:260px;

background:#22d3ee;

bottom:-80px;

left:35%;

animation-duration:20s;

}

from{

transform:translateY(-30px) translateX(0);

}

to{

}

}

<script>

/*==========================
Cursor Follow
==========================*/

const cursor=document.querySelector(".cursor");
const ring=document.querySelector(".cursor-ring");

window.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

ring.style.left=e.clientX+"px";
ring.style.top=e.clientY+"px";

});

/*==========================
Magnetic Buttons
==========================*/

document.querySelectorAll(".magnetic")
.forEach(btn=>{

btn.addEventListener("mousemove",e=>{

const r=btn.getBoundingClientRect();

const x=e.clientX-r.left-r.width/2;

const y=e.clientY-r.top-r.height/2;

btn.style.transform=

`translate(${x*.15}px,
${y*.15}px)
scale(1.05)`;

});

btn.addEventListener("mouseleave",()=>{

btn.style.transform="";

});

});

/*==========================
Ripple Click Effect
==========================*/

document.querySelectorAll(".ripple-btn")
.forEach(btn=>{

btn.addEventListener("click",e=>{

const ripple=document.createElement("span");

ripple.className="ripple";

const rect=btn.getBoundingClientRect();

ripple.style.left=
(e.clientX-rect.left)+"px";

ripple.style.top=
(e.clientY-rect.top)+"px";

btn.appendChild(ripple);

setTimeout(()=>{

ripple.remove();

},700);

});

});

/*==========================
Scroll Reveal
==========================*/

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

entry.target.classList.add("active");

}

});

},{threshold:.15});

document.querySelectorAll(".reveal")
.forEach(el=>observer.observe(el));

/*==========================
Hero Parallax
==========================*/

document.addEventListener("mousemove",e=>{

const hero=document.getElementById("hero");

const x=(e.clientX/window.innerWidth-.5)*20;

const y=(e.clientY/window.innerHeight-.5)*20;

hero.style.transform=

`perspective(1200px)
rotateY(${x*.2}deg)
rotateX(${-y*.2}deg)`;

});

</script>

<script>

/*==========================
Preloader
===========================*/

window.addEventListener("load",()=>{

setTimeout(()=>{

preloader.style.opacity="0";

preloader.style.pointerEvents="none";

setTimeout(()=>{

preloader.remove();

},1000);

},1200);

});

/*==========================
Cursor Trail
===========================*/

const trail=[];

for(let i=0;i<12;i++){

const d=document.createElement("div");

d.style.position="fixed";

d.style.width="8px";

d.style.height="8px";

d.style.borderRadius="50%";

d.style.background="rgba(0,229,255,.4)";

d.style.pointerEvents="none";

d.style.zIndex="9999";

d.style.filter="blur(2px)";

document.body.appendChild(d);

trail.push({

el:d,

x:0,

y:0

});

}

let mx=0,my=0;

window.addEventListener("mousemove",e=>{

mx=e.clientX;

my=e.clientY;

});

function animateTrail(){

let x=mx;

let y=my;

trail.forEach(dot=>{

dot.x+=(x-dot.x)*0.25;

dot.y+=(y-dot.y)*0.25;

dot.el.style.left=dot.x+"px";

dot.el.style.top=dot.y+"px";

x=dot.x;

y=dot.y;

});

requestAnimationFrame(animateTrail);

}

animateTrail();

/*==========================
Particles
===========================*/

const canvas=document.getElementById("particles");

const ctx=canvas.getContext("2d");

function resize(){

canvas.width=innerWidth;

canvas.height=innerHeight;

}

resize();

window.addEventListener("resize",resize);

const particles=[];

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

vx:(Math.random()-.5)*0.5,

vy:(Math.random()-.5)*0.5,

r:Math.random()*2+1

});

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.vx;

p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;

if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fillStyle="rgba(255,255,255,.45)";

ctx.fill();

});

requestAnimationFrame(render);

}

render();

/*==========================
Mobile Ripple
===========================*/

document.addEventListener("touchstart",e=>{

const t=e.touches[0];

const ripple=document.createElement("div");

ripple.style.position="fixed";

ripple.style.left=t.clientX+"px";

ripple.style.top=t.clientY+"px";

ripple.style.width="20px";

ripple.style.height="20px";

ripple.style.borderRadius="50%";

ripple.style.background="rgba(255,255,255,.35)";

ripple.style.transform="translate(-50%,-50%)";

ripple.style.pointerEvents="none";

ripple.style.transition="1s";

document.body.appendChild(ripple);

setTimeout(()=>{

ripple.style.transform=

"translate(-50%,-50%) scale(18)";

ripple.style.opacity="0";

},20);

setTimeout(()=>{

ripple.remove();

},1000);

});

/*==========================
Parallax Background
===========================*/

window.addEventListener("mousemove",e=>{

const x=(e.clientX/window.innerWidth-.5)*30;

const y=(e.clientY/window.innerHeight-.5)*30;

document.querySelectorAll(".blob")

.forEach((b,i)=>{

b.style.transform=

`translate(${x*(i+1)*.3}px,

${y*(i+1)*.3}px)`;

});

});

/*==========================
Create Stars
===========================*/

for(let i=0;i<80;i++){

const s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(s);

}

/*==========================
Performance
===========================*/

if(window.innerWidth<768){

document.querySelectorAll(".blob")

.forEach(el=>{

el.style.display="none";

});

}

/*==========================
Smooth Fade Between Pages
===========================*/

document.querySelectorAll("a")

.forEach(link=>{

link.addEventListener("click",e=>{

const href=link.getAttribute("href");

if(href && !href.startsWith("#")){

document.body.style.transition=".4s";

document.body.style.opacity="0";

}

});

});

</script>

<!-- END OF PREMIUM ANIMATION ENGINE -->
